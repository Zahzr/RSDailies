<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RSDailies - RS3 Dailies, Weeklies, Monthlies Task Checklist for RuneScape</title>
    <link rel="icon" type="image/png" href="/img/dailyscape.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <meta name="description"
        content="Self-hosted RS3 task tracker. Custom tasks, farming, dailies, gathering, weeklies, and monthlies with profiles and reset timers.">
    <link rel="stylesheet" href="/src/styles/index.css">
</head>

<body id="app">
    <!-- Main UI Mount Points -->
    <nav id="main-nav" class="navbar nav-pills fixed-top navbar-expand-lg navbar-dark bg-dark"></nav>

    <div class="container-xl" id="overview-mount"></div>

    <div class="container-xl activity_tables" id="dashboard-container">
        <div class="row" id="dashboard-mount"></div>
    </div>

    <footer id="main-footer"></footer>

    <!-- Modals Mount -->
    <div id="modals-mount">
        <div id="token-modal" class="modal fade" tabindex="-1"></div>
        <div id="custom-task-modal" class="modal fade" tabindex="-1"></div>
    </div>

    <!-- Templates Mount -->
    <template id="sample_row"></template>

    <div id="tooltip" style="display:none; visibility:hidden;"></div>

    <!-- The Loader script will populate the mounts before initializing the app -->
    <script type="module">
        import { loadLayout } from '../ui/layout/loader.js';
        import { initAppRoot } from '../app/legacy-app.js';

        async function bootstrap() {
            await loadLayout();
            initAppRoot();
        }
        bootstrap();
    </script>
</body>

</html>
