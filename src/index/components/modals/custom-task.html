<div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
        <div class="modal-header">
            <h5 id="custom-task-modal-title" class="modal-title">Add Custom Task</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
            <form id="custom-task-form" autocomplete="off">
                <div class="mb-3">
                    <label for="custom-task-name" class="form-label">Name</label>
                    <input id="custom-task-name" type="text" class="form-control" maxlength="60" required>
                    <div class="invalid-feedback">Enter a task name.</div>
                </div>

                <div class="mb-3">
                    <label for="custom-task-note" class="form-label">Note (optional)</label>
                    <textarea id="custom-task-note" class="form-control" rows="2" maxlength="240"></textarea>
                </div>

                <div class="mb-3">
                    <label for="custom-task-wiki" class="form-label">Wiki / URL (optional)</label>
                    <input id="custom-task-wiki" type="url" class="form-control" placeholder="https://...">
                </div>

                <div class="row g-3">
                    <div class="col-sm-6">
                        <label for="custom-task-reset" class="form-label">Reset</label>
                        <select id="custom-task-reset" class="form-select">
                            <option value="daily" selected>Daily</option>
                            <option value="weekly">Weekly</option>
                            <option value="monthly">Monthly</option>
                            <option value="timer">Repeating Timer</option>
                        </select>
                    </div>
                    <div class="col-sm-6">
                        <label for="custom-task-alert" class="form-label">Alert Days Before Reset</label>
                        <input id="custom-task-alert" type="number" class="form-control" value="0" min="0" step="1">
                    </div>
                </div>

                <div id="custom-task-timer-block" class="row g-3 mt-1" style="display:none; visibility:hidden;">
                    <div class="col-sm-6">
                        <label for="custom-task-timer-mins" class="form-label">Timer Minutes</label>
                        <input id="custom-task-timer-mins" type="number" class="form-control" value="60" min="1"
                            step="1">
                    </div>
                    <div class="col-sm-6 d-flex align-items-end">
                        <div class="text-muted" style="font-size: 0.9rem;">
                            Repeating timers behave like daily tasks, and show as a cooldown.
                        </div>
                    </div>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button id="custom-task-save" type="button" class="btn btn-primary">Add Task</button>
        </div>
    </div>
</div>
